<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dictionary App</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #1f2937, #111827);
        padding: 20px;
      }

      .card {
        width: 100%;
        max-width: 420px;
        background: #ffffff;
        border-radius: 16px;
        padding: 25px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        text-align: center;
      }

      h1 {
        font-size: 28px;
        margin-bottom: 20px;
        color: #111827;
      }

      input {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        border-radius: 10px;
        border: 1px solid #d1d5db;
        outline: none;
        margin-bottom: 15px;
      }

      input:focus {
        border-color: #6366f1;
      }

      button {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        background: #22c55e;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
        font-weight: bold;
      }

      button:hover {
        background: #16a34a;
      }

      .result {
        margin-top: 20px;
        text-align: left;
      }

      .result p {
        margin-bottom: 10px;
        padding: 10px;
        background: #f3f4f6;
        border-radius: 8px;
        font-size: 14px;
      }

      audio {
        width: 100%;
        margin-top: 10px;
      }

      .error {
        color: red;
        margin-top: 10px;
        font-size: 14px;
      }

      .loading {
        margin-top: 10px;
        font-size: 14px;
        color: #6b7280;
      }
    </style>
  </head>

  <body>
    <div class="card" id="card">
      <h1>Dictionary</h1>

      <input type="text" id="value" placeholder="Type a word..." />
      <button id="button">Find Meaning</button>

      <div id="status"></div>
      <div class="result" id="result"></div>
    </div>

    <script>
      let button = document.getElementById("button");
      let result = document.getElementById("result");
      let statusBox = document.getElementById("status");

      async function displayValue() {
        let letter = document.getElementById("value").value.trim();

        result.innerHTML = "";

        if (!letter) {
          statusBox.innerHTML = "<p class='error'>Please enter a word</p>";
          return;
        }

        statusBox.innerHTML = "<p class='loading'>Searching...</p>";

        const api_url = `https://api.dictionaryapi.dev/api/v2/entries/en/${letter}`;

        try {
          let data = await fetch(api_url);

          if (!data.ok) {
            throw new Error("Word not found");
          }

          let a = await data.json();

          let word = a[0].word;
          let defination =
            a[0].meanings?.[0]?.definitions?.[0]?.definition ||
            "No definition found";
          let example =
            a[0].meanings?.[0]?.definitions?.[0]?.example ||
            "No example available";
          let sound = a[0].phonetics?.[0]?.audio;

          result.innerHTML += `<p><strong>Word:</strong> ${word}</p>`;
          result.innerHTML += `<p><strong>Definition:</strong> ${defination}</p>`;
          result.innerHTML += `<p><strong>Example:</strong> ${example}</p>`;

          if (sound) {
            result.innerHTML += `
            <audio controls>
              <source src="${sound}" type="audio/mpeg" />
            </audio>
          `;
          }

          statusBox.innerHTML = "";
        } catch (error) {
          statusBox.innerHTML =
            "<p class='error'>Word not found. Try another.</p>";
        }
      }

      button.addEventListener("click", displayValue);
    </script>
  </body>
</html>
